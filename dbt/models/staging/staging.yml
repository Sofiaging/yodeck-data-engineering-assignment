version: 2

models:

  - name: stg_accounts
    description: Clean accounts snapshots.

    columns:

      - name: account_id
        tests:
          - not_null

      - name: account_name
        tests:
          - not_null

      - name: status
        tests:
          - not_null

  - name: stg_subscriptions
    description: Clean subscription snapshots.

    columns:

      - name: subscription_id
        tests:
          - not_null

      - name: account_id
        tests:
          - not_null

      - name: plan_name
        tests:
          - not_null

      - name: plan_price
        tests:
          - not_null

  - name: stg_invoices
    description: Clean invoice snapshots.

    columns:

      - name: invoice_id
        tests:
          - not_null

      - name: account_id

      - name: subscription_id

      - name: amount
        tests:
          - not_null

  - name: stg_exchange_rates
    description: Daily FX rates.

    columns:

      - name: rate_date
        tests:
          - not_null

      - name: currency
        tests:
          - not_null